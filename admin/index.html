<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>نظام إدارة علاقات المرضى — UHIA الأقصر</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<!-- تضمين رابط الـ API مباشرة لضمان عدم وجود أخطاء -->
<script>
  var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz_Z-lvfMPKOGcIRPvkvjD3eXnLl3ymX3G-s107B6cMO_daGnFc11TdfOp7FfqQJKg/exec';
</script>
<link rel="stylesheet" href="admin.css">
</head>
<body>

<!-- ═══ شاشة الدخول (Premium Login) ═══ -->
<div class="login-screen" id="loginScreen">
  <div class="glass-card login-card">
    <div class="login-logo">
      <img src="https://upload.wikimedia.org/wikipedia/ar/a/ab/%D8%A7%D9%84%D9%87%D9%8A%D8%A6%D8%A9_%D8%A7%D9%84%D8%B9%D8%A0%D9%85%D8%A9_%D9%84%D9%84%D8%AA%D8%A3%D9%85%D9%8A%D9%86_%D8%A7%D9%84%D8%B5%D8%AD%D9%8A_%D8%A7%D9%84%D8%B4%D8%A0%D9%85%D9%84_%28%D9%85%D8%B5%D8%B1%29.png" alt="شعار">
    </div>
    <h1 class="login-title">بوابة الموظفين</h1>
    <p class="login-sub">إدارة علاقات المرضى والشكاوى - فرع الأقصر</p>
    
    <div class="form-field">
      <label>رقم الهاتف (أو كود الدخول)</label>
      <input type="text" id="phoneInput" placeholder="أدخل رقم هاتفك" class="glass-input">
    </div>
    
    <div class="form-field">
      <label>كلمة المرور</label>
      <div class="pwd-wrap">
        <input type="password" id="pwdInput" placeholder="أدخل كلمة المرور" class="glass-input" onkeydown="if(event.key==='Enter') doLogin()">
        <button class="pwd-toggle" onclick="togglePwd()">👁</button>
      </div>
      <span class="field-error" id="loginError"></span>
    </div>
    
    <button class="btn-primary btn-block" id="loginBtn" onclick="doLogin()">
      <span id="loginBtnText">تسجيل الدخول</span>
    </button>
  </div>
</div>

<!-- ═══ لوحة الإدارة ═══ -->
<div class="admin-wrap" id="adminWrap" style="display:none">
  
  <!-- القائمة الجانبية -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="user-avatar">👤</div>
      <div class="user-info">
        <div class="user-name" id="displayUserName">الموظف</div>
        <div class="user-role" id="displayUserRole">Role</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="#complaints" class="nav-item active" onclick="switchTab('complaints')">📋 إدارة الشكاوى</a>
      <a href="../dashboard/index.html" class="nav-item">📊 لوحة التحكم (داشبورد)</a>
      <a href="#" class="nav-item danger" onclick="logout()">🚪 تسجيل الخروج</a>
    </nav>
  </aside>

  <!-- المحتوى الرئيسي -->
  <main class="main-content">
    <header class="topbar">
      <h2>إدارة الشكاوى النشطة</h2>
      <div class="topbar-actions">
        <button class="btn-icon" onclick="loadData()">🔄 تحديث البيانات</button>
      </div>
    </header>

    <!-- شريط الفلاتر الذكي -->
    <div class="glass-panel filters-bar">
      <div class="search-box">
        <span class="icon">🔍</span>
        <input type="text" id="searchInput" placeholder="ابحث بالاسم، الرقم القومي، رقم الشكوى..." class="glass-input" oninput="debounceSearch()">
      </div>
      
      <div class="filters-grid">
        <select id="fStatus" onchange="applyFilters()" class="glass-input">
          <option value="">كل الحالات</option>
          <option>جديدة</option>
          <option>تحت المراجعة</option>
          <option>تم الحل</option>
          <option>مغلقة</option>
        </select>
        
        <select id="fSeverity" onchange="applyFilters()" class="glass-input">
          <option value="">مستوى الخطورة</option>
          <option>عالٍ</option>
          <option>متوسط</option>
          <option>منخفض</option>
        </select>
      </div>
    </div>

    <!-- جدول البيانات -->
    <div class="glass-panel table-panel">
      <div class="table-meta" id="tableMeta">جارٍ التحميل...</div>
      <div class="table-responsive">
        <table class="data-table" id="adminTable">
          <thead>
            <tr>
              <th>رقم الشكوى</th>
              <th>الاسم / الهاتف</th>
              <th>المنفذ</th>
              <th>الحالة</th>
              <th>الخطورة</th>
              <th>المرفقات</th>
              <th>الإجراء</th>
            </tr>
          </thead>
          <tbody id="adminTableBody">
            <tr><td colspan="7" class="table-empty">الرجاء الانتظار، جاري جلب البيانات...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- ═══ نافذة الإجراءات (Action Modal) ═══ -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="glass-modal" id="modalBox">
    <div class="modal-header">
      <h2 id="modalTitle">معالجة الشكوى</h2>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody">
      <!-- بيانات الشكوى بالتفصيل -->
      <div class="complaint-details-box" id="complaintDetails"></div>
      
      <!-- المرفقات والصوت -->
      <div class="media-box" id="mediaBox"></div>
      
      <hr class="glass-divider">
      
      <!-- نموذج التحديث -->
      <div class="update-form">
        <div class="form-group">
          <label>تحديث الحالة:</label>
          <select id="modalStatus" class="glass-input">
            <option>جديدة</option>
            <option>تحت المراجعة</option>
            <option>تم الحل</option>
            <option>مغلقة</option>
          </select>
        </div>
        <div class="form-group">
          <label>ملاحظات المعالجة (تظهر للإدارة):</label>
          <textarea id="modalNote" class="glass-input" rows="3" placeholder="ما هي الخطوات التي اتخذتها لحل هذه الشكوى؟"></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal()">إلغاء</button>
      <button class="btn-primary" id="saveBtn" onclick="saveUpdate()">💾 حفظ الإجراءات</button>
    </div>
  </div>
</div>

<!-- Full Screen Loader -->
<div class="full-loading" id="fullLoading" style="display:none">
  <div class="spinner"></div>
</div>

<div class="toast" id="toast"></div>

<!-- Custom Scripts -->
<script src="admin.js"></script>
</body>
</html>
